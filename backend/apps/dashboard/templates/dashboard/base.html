<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cobranzas IA{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3e;
      --accent:   #6366f1;
      --accent-h: #818cf8;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand span { color: var(--accent); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: color .15s;
    }
    nav a:hover, nav a.active { color: var(--text); }

    /* LAYOUT */
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title { font-size: 15px; font-weight: 600; }

    /* BOTONES */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
      text-decoration: none;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-pending  { background: #1e293b; color: var(--yellow); }
    .badge-processing { background: #1e3a5f; color: #60a5fa; }
    .badge-completed { background: #14302a; color: var(--green); }
    .badge-failed   { background: #3b1212; color: var(--red); }

    /* TABLA */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 0 12px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input[type=text], input[type=file], select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.blue  { color: var(--accent-h); }

    /* ALERTS */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-success { background: #14302a; color: var(--green); border: 1px solid #166534; }
    .alert-error   { background: #3b1212; color: var(--red);   border: 1px solid #7f1d1d; }

    /* UPLOAD ZONE */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s;
    }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone p { color: var(--muted); font-size: 13px; margin-top: 8px; }

    /* TRANSCRIPT */
    .transcript {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.8;
    }
    .turn-agent { color: var(--accent-h); }
    .turn-client { color: var(--text); }

    /* HTMX loading */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">📞 <span>Cobranzas</span> IA</a>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
  <a href="/campaigns/" {% if '/campaigns' in request.path %}class="active"{% endif %}>Campañas</a>
  <a href="/calls/" {% if '/calls' in request.path %}class="active"{% endif %}>Llamadas</a>
</nav>

<div class="page">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
