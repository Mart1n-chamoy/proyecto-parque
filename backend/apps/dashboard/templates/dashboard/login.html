<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Cobranzas IA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --accent: #6366f1; --text: #e2e8f0; --muted: #64748b;
      --red: #ef4444; --radius: 8px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, sans-serif; font-size: 14px;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px; width: 100%; max-width: 380px;
    }
    .logo {
      text-align: center; margin-bottom: 28px;
      font-size: 22px; font-weight: 700;
    }
    .logo span { color: var(--accent); }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); padding: 10px 12px;
      font-size: 14px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); padding: 11px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      margin-top: 8px; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .alert {
      background: #3b1212; color: var(--red); border: 1px solid #7f1d1d;
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">📞 <span>Cobranzas</span> IA</div>
  <h2>Iniciar sesión</h2>
  <p class="subtitle">Ingresá con tu cuenta para continuar</p>

  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" name="username" placeholder="tu_usuario" autofocus required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Entrar</button>
  </form>
</div>
</body>
</html>
